<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">

<head>
  <link rel="stylesheet" href="../../../../../webapp/style.css?for-local-testing-only" type="text/css" media="screen"
        title="Stylesheet"/>
</head>
<body>

<wicket:panel>
  <h3>Profile Image</h3>
  <p>Your profile image is shown alongside your nanopublications and on your user page.</p>
  <p><em>After changes, you may have to wait a few minutes and <a href="./profile">refresh this page</a> for this list
    to update.</em></p>

  <p wicket:id="no-image-note"></p>

  <div wicket:id="image-container">
    <img wicket:id="image" class="user-profile-pic" alt="Profile image"/>
    <p>Image URL: <a wicket:id="image-url-link"></a></p>
  </div>

  <h3>Actions</h3>
  <ul>
    <li wicket:id="publish-image-item"><a wicket:id="publish-image-link" class="smallbutton"></a></li>
  </ul>
</wicket:panel>

</body>
</html>
