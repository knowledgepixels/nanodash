<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
  <table class="result-table claimant-table">
    <thead>
      <tr><th>Definition</th><th>Admins</th><th></th></tr>
    </thead>
    <tbody>
      <tr wicket:id="claimants">
        <td>
          <a wicket:id="root-link">[root]</a>
          <span class="badge current-ref" wicket:id="current">current</span>
          <span class="badge default-ref" wicket:id="default">default</span>
        </td>
        <td>
          <span wicket:id="admins"><span wicket:id="admin-sep">, </span><a wicket:id="admin-link">[admin]</a></span>
          <span wicket:id="no-admins">(none)</span>
        </td>
        <td><a class="claimant-view" wicket:id="view-link">view this space →</a></td>
      </tr>
    </tbody>
  </table>
</wicket:panel>
</body>
</html>
