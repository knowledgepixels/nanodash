<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
  <div class="row-section">
    <div class="col-12">
      <h3>Definitions claiming this identifier</h3>
      <p>This space identifier (<span wicket:id="iri"></span>) is claimed by
        <span wicket:id="count"></span> distinct root definitions. Each is a separate
        space asserting the same identifier — there is no automatically "true" one.</p>
      <ul class="claimant-list">
        <li wicket:id="claimants">
          <span class="claimant-root">Definition <a wicket:id="root-link">[root]</a></span>
          <span class="badge current-ref" wicket:id="current">currently shown</span>
          <a class="claimant-view" wicket:id="view-link">view this space →</a>
          <div class="claimant-admins">Admins:
            <span wicket:id="admins"><span wicket:id="admin-sep">, </span><a wicket:id="admin-link">[admin]</a></span>
            <span wicket:id="no-admins">(none)</span>
          </div>
        </li>
      </ul>
    </div>
  </div>
</wicket:panel>
</body>
</html>
