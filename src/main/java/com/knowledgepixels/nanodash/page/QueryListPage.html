<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
  <wicket:remove>
    <link rel="stylesheet" href="../../../../../webapp/style.css?for-local-testing-only" type="text/css" media="screen" title="Stylesheet" />
</wicket:remove>
  <wicket:head>
    <title>Query | nanodash</title>
  </wicket:head>
</head>
<body>
<wicket:extend>

  <div class="row-section">
    <div class="col-12">

      <h2>Basic Search</h2>

      <form wicket:id="form">
        <input wicket:id="search" type="text" class="textfield" size="100" required/>
        <input type="submit" class="button" value="Search">
        <br>
      </form>

    </div>
  </div>

  <div class="row-section gap-above">
    <div class="col-12">

      <div wicket:id="queries" class="users"></div>

    </div>
  </div>

</wicket:extend>
</body>
</html>
