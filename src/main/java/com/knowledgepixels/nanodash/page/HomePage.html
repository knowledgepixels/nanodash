<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:head>
  <title>nanodash</title>
</wicket:head>
<wicket:extend>

  <div class="row-section">
    <div class="col-12">
      <h2>Nanodash Home</h2>
      <p><span wicket:id="warning" class="negative"></span></p>
      <p><span wicket:id="text"></span></p>
    </div>
  </div>

  <div class="row-section">
    <div class="col-6">
      <div wicket:id="mostrecent">
        <div wicket:id="view">...</div>
      </div>
    </div>

    <div class="col-6">
      <div wicket:id="topCreators" class="users">
        <div wicket:id="creatorsView">...</div>
      </div>
      <div wicket:id="getStartedTemplates" class="forms">
        <div wicket:id="getStartedTemplatesView">...</div>
      </div>
    </div>
  </div>

  <div class="row-section">
    <div class="col-12 home-footer">
      <p><a href="https://github.com/knowledgepixels/nanodash">Nanodash on GitHub</a> · by
        <a href="https://knowledgepixels.com/">Knowledge Pixels</a>.</p>
    </div>
  </div>

</wicket:extend>
</body>
</html>
