<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
  <wicket:head>
    <title>Users | nanodash</title>
  </wicket:head>
</head>
<body>
<wicket:extend>

  <div class="row-section">

    <div class="col-12 header">
      <h2>Users</h2>
    </div>

    <div class="col-6">

      <div wicket:id="topcreators" class="users"></div>

    </div>

    <div class="col-6">

      <div wicket:id="latestusers" class="users"></div>

    </div>

  </div>

  <div class="row-section gap-above">

    <div class="col-6">

      <div wicket:id="approved-human-users" class="users"></div>

      <p>
        If you are yourself approved, approving of somebody else's introduction will make them approved too:
        <a wicket:id="approve" class="smallbutton">approve somebody else</a>
      </p>

    </div>

    <div class="col-6">

      <div wicket:id="approved-software-agents" class="users"></div>

    </div>

  </div>

  <div class="row-section gap-above">

    <div class="col-6">

      <div wicket:id="other-users" class="users"></div>

    </div>

  </div>

</wicket:extend>
</body>
</html>
