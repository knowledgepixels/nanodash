<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
  <wicket:head>
    <title wicket:id="pagetitle">... (space) | nanodash</title>
  </wicket:head>
</head>
<body>
<wicket:extend>

  <div wicket:id="justPublishedMessage"></div>
  <div class="row-section">
    <div class="col-12 header">
      <h2><span wicket:id="spacename">Space ABC</span></h2>
      <p class="subtitle" wicket:id="spacetype">Space type</p>
      <p><span wicket:id="id"></span></p>
      <div wicket:id="altids" class="hide-if-empty inline">...</div>
    </div>
  </div>

  <div class="row-section">
    <div class="col-6">
      <h3 class="hide-if-empty header">Date</h3>
      <div wicket:id="date" class="hide-if-empty content">...</div>

      <h3>About</h3>
      <div wicket:id="description">...</div>
      <div wicket:id="alliances" class="hide-if-empty">...</div>
      <div wicket:id="consortiums" class="hide-if-empty">...</div>
      <div wicket:id="organizations" class="hide-if-empty">...</div>
      <div wicket:id="taskforces" class="hide-if-empty">...</div>
      <div wicket:id="divisions" class="hide-if-empty">...</div>
      <div wicket:id="taskunits" class="hide-if-empty">...</div>
      <div wicket:id="groups" class="hide-if-empty">...</div>
      <div wicket:id="programs" class="hide-if-empty">...</div>
      <div wicket:id="communities" class="hide-if-empty">...</div>
      <div wicket:id="outlets" class="hide-if-empty">...</div>
      <div wicket:id="campaigns" class="hide-if-empty">...</div>
      <div wicket:id="projects" class="hide-if-empty">...</div>
      <div wicket:id="initiatives" class="hide-if-empty">...</div>
      <div wicket:id="events" class="hide-if-empty">...</div>
      <div wicket:id="resources">...</div>
      <p><a href="#" class="button" wicket:id="content-button">Content</a></p>
    </div>

    <div class="col-6">
      <div wicket:id="roles">...</div>
      <div wicket:id="user-lists" class="users"></div>
    </div>
  </div>

  <div wicket:id="views"></div>

  <div class="row-section">
    <div class="col-12 header">
      <h3>Pinned</h3>
    </div>
    <div wicket:id="pin-groups"></div>
    <div class="col-12 footer">
      <div wicket:id="pin-buttons"></div>
    </div>
  </div>

</wicket:extend>
</body>
</html>
